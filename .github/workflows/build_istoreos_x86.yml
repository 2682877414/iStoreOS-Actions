name: Build iStoreOS x86_64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build x86_64 Firmware
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          mode: "build"
          openwrt_board: "x86_64"
          kernel_usage: "stable"
          auto_kernel: true
          openwrt_files: "files"

      - name: Generate ISO
        run: |
          cd out
          for f in *.img.gz; do
            if [ -f "$f" ]; then
              iso_name="${f%.img.gz}.iso"
              echo "Converting $f to $iso_name"
              gunzip -c "$f" | dd of="${f%.img.gz}.img" bs=4M
              genisoimage -o "$iso_name" "${f%.img.gz}.img"
              rm -f "${f%.img.gz}.img"
            fi
          done

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: iStoreOS-x86_64
          path: out/
