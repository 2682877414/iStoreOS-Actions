name: Build iStoreOS X86_64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build iStoreOS X86_64
        uses: ophub/amlogic-s9xxx-openwrt@main
        with:
          mode: build
          openwrt_board: x86_64
          kernel_usage: stable
          auto_kernel: true
          openwrt_files: files

      - name: Build ISO Image
        run: |
          cd out
          for img in *.img.gz; do
            if [ -f "$img" ]; then
              bin=${img%.img.gz}
              gunzip -c $img > $bin.img
              genisoimage -o $bin.iso $bin.img
              rm -f $bin.img
            fi
          done

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: iStoreOS-x86_64
          path: out/
