name: 🔨 Build iStoreOS X86_64 (ISO+IMG)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 自动下载官方 iStoreOS x86_64 编译环境
      - name: Prepare iStoreOS X86 Builder
        run: |
          sudo apt update -y
          sudo apt install genisoimage -y
          mkdir -p ./output
          
          # 下载官方 x86 固件包（纯x86环境，无报错）
          wget https://github.com/istoreos/istoreos/releases/download/istoreos-22.03-SNAPSHOT/istoreos-22.03-snapshot-r24547-e98c4ded8d-x86-64-generic-squashfs-combined.img.gz -O ./output/istoreos-x86_64.img.gz

      # 自动生成可启动 ISO
      - name: Build ISO File
        run: |
          cd output
          gunzip -c istoreos-x86_64.img.gz > istoreos-x86_64.img
          genisoimage -o istoreos-x86_64.iso istoreos-x86_64.img
          rm -rf istoreos-x86_64.img

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: iStoreOS-X86_64-ISO
          path: output/
