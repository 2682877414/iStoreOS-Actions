name: Build iStoreOS x86_64 (IMG+ISO)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt update && sudo apt install -y genisoimage

      - name: Download latest iStoreOS x86_64
        run: |
          mkdir -p out
          cd out
          wget -O istoreos-x86.img.gz https://dl.openwrt.ai/latest/istoreos/x86/64/openwrt-x86-64-generic-squashfs-combined.img.gz

      - name: Convert to ISO
        run: |
          cd out
          gunzip -f istoreos-x86.img.gz
          genisoimage -o istoreos-x86.iso istoreos-x86.img
          rm -f istoreos-x86.img

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: iStoreOS-x86_64
          path: out/
