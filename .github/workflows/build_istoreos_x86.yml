name: Build iStoreOS x86_64 Official

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install necessary tools
        run: |
          sudo apt update
          sudo apt install -y genisoimage wget

      - name: Download real iStoreOS x86 firmware
        run: |
          mkdir -p out
          cd out
          wget -O iStoreOS-x86_64.img.gz https://cdn.istoreos.com/istoreos/22.03/snapshot/targets/x86/64/openwrt-x86-64-generic-squashfs-combined.img.gz

      - name: Convert IMG to ISO
        run: |
          cd out
          gunzip iStoreOS-x86_64.img.gz
          genisoimage -o iStoreOS-x86_64.iso iStoreOS-x86_64.img

      - name: Upload real firmware
        uses: actions/upload-artifact@v4
        with:
          name: iStoreOS-x86_64
          path: out/
