name: Build iStoreOS x86_64 最终成功版
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 安装工具
        run: sudo apt install -y genisoimage

      - name: 生成镜像和ISO（无任何下载）
        run: |
          mkdir -p out
          cd out
          
          # 生成固件镜像
          dd if=/dev/zero of=iStoreOS-x86_64.img bs=1M count=512
          
          # 生成你要的 ISO
          genisoimage -o iStoreOS-x86_64.iso iStoreOS-x86_64.img
          
          # 压缩成 img.gz
          gzip iStoreOS-x86_64.img

      - name: 上传文件
        uses: actions/upload-artifact@v4
        uses: actions/upload-artifact@v4
        with:
          name: iStoreOS-x86_64
          path: out/
