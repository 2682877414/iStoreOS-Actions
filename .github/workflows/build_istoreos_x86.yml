name: Build iStoreOS x86_64
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y qemu-utils genisoimage

      - name: Create dummy image
        run: |
          mkdir -p out
          cd out
          truncate -s 512M istoreos-x86_64.img
          genisoimage -o istoreos-x86_64.iso istoreos-x86_64.img

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: iStoreOS-x86_64
          path: out/
