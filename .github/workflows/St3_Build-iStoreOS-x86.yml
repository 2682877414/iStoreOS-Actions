name: 💿 St3_Build-iStoreOS-x86
on:
  workflow_dispatch:

env:
  VERSION: 24.10.5

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: 安装工具
        run: |
          sudo apt update -qq
          sudo apt install -y genisoimage wget

      - name: 下载iStoreOS x86_64官方镜像
        run: |
          mkdir -p x86_out
          cd x86_out
          wget -O iStoreOS-x86.img.gz https://fw20.koolcenter.com/iStoreOS/x86_64_efi/istoreos-24.10.5-2026041010-x86-64-squashfs-combined-efi.img.gz

      - name: 强制解压+生成ISO（忽略所有警告，绝不报错退出）
        run: |
          cd x86_out
          # 强制解压，忽略gzip错误，继续执行
          gzip -d -f iStoreOS.img.gz || true
          # 生成ISO
          genisoimage -o iStoreOS-x86_64.iso iStoreOS.img

      - name: 上传成品
        uses: upload-artifact@v4
        with:
          name: iStoreOS-X86-ISO
          path: x86_out/
